# StatefulSet de PostgreSQL para el histórico de scraping.
#
# Por qué StatefulSet en vez de Deployment:
#   - Necesita identidad estable (postgres-0) y storage estable (PVC pegado al pod).
#   - volumeClaimTemplates crea un PVC por réplica con naming determinístico
#     (data-postgres-0). Si el pod se reschedule, el mismo PVC se monta.
#   - Un Deployment + PVC compartido NO funciona: si el pod se mueve de nodo,
#     el PVC ReadWriteOnce no puede seguirlo y el pod queda en Pending.
#
# 1 réplica para el TP — no es alta disponibilidad. Para HA real se usa un
# operator tipo CloudNativePG o Zalando postgres-operator (ver ADR 0007).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ml-scraper
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: ml-scraper-production
    app.kubernetes.io/version: "16"
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: ml-scraper
spec:
  # serviceName tiene que coincidir con el nombre del Service headless/ClusterIP
  # que define el DNS del pod (postgres-0.postgres.ml-scraper.svc.cluster.local).
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: ml-scraper-production
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: ml-scraper-production
        app.kubernetes.io/version: "16"
        app.kubernetes.io/component: database
        app.kubernetes.io/managed-by: kubectl
        app.kubernetes.io/part-of: ml-scraper
    spec:
      # Postgres oficial corre como UID 999 ("postgres") por default.
      # fsGroup 999 hace que el PVC montado tenga el group-ownership correcto
      # para que postgres pueda escribir en /var/lib/postgresql/data.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          # postgres:16-trixie → Postgres 16 (LTS hasta 2028-11)
          # sobre Debian 13 (trixie). Pin de major + distro para reproducibilidad.
          image: "postgres:16-trixie"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            # Postgres necesita escribir en /var/run/postgresql para el socket Unix
            # y en /tmp para archivos temporales del query planner.
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "scraper"
            - name: POSTGRES_USER
              value: "scraper"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # PGDATA dentro del mountpoint del PVC.
            # Subdir explícito porque postgres:* no inicializa el cluster si
            # el directorio no está vacío, y algunos provisionadores dejan
            # un lost+found en la raíz del FS.
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # readinessProbe usa pg_isready, el binario oficial de Postgres
          # que verifica que el postmaster esté aceptando conexiones TCP.
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - scraper
                - -d
                - scraper
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - scraper
                - -d
                - scraper
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # Init scripts del ConfigMap. postgres:* ejecuta TODO archivo
            # *.sql, *.sql.gz o *.sh que encuentre acá durante el primer
            # arranque (cluster vacío). En arranques subsiguientes los ignora.
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init-sql
            items:
              - key: init.sql
                path: init.sql
  # volumeClaimTemplates: el StatefulSet crea automáticamente un PVC por
  # réplica usando este template. Naming: <template-name>-<sts-name>-<ordinal>
  # → data-postgres-0. Sobrevive a la eliminación del pod (no del STS).
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: postgres
          app.kubernetes.io/instance: ml-scraper-production
          app.kubernetes.io/component: database-storage
          app.kubernetes.io/part-of: ml-scraper
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
