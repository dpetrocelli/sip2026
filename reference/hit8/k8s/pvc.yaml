# PersistentVolumeClaim para persistir los JSON y screenshots entre corridas.
# storageClassName: local-path usa el provisionador que k3s incluye out-of-the-box
# (Rancher local-path-provisioner). En un cluster en nube reemplazarlo por
# gp3 (EKS), premium-rwo (GKE) o managed-premium (AKS).
# accessModes: ReadWriteOnce es suficiente porque un solo Job/Pod escribe a la vez.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scraper-output
  namespace: ml-scraper
  labels:
    app.kubernetes.io/name: ml-scraper
    app.kubernetes.io/instance: ml-scraper-production
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: storage
    app.kubernetes.io/managed-by: kubectl
spec:
  # ReadWriteOnce: montado en lectura-escritura por un solo nodo a la vez.
  # Suficiente dado que Job y CronJob no corren en paralelo por diseño.
  accessModes:
    - ReadWriteOnce
  # local-path está disponible en k3s/k3d sin configuración adicional.
  storageClassName: local-path
  resources:
    requests:
      # 1 Gi es suficiente para JSON + screenshots de varias corridas del CronJob.
      storage: 1Gi
