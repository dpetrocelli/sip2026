# Secret con la contraseña del usuario `scraper` de PostgreSQL.
#
# IMPORTANTE — esto es solo para el TP / entorno de aprendizaje:
#   - El password está en base64 (NO es cifrado, es solo encoding).
#   - "changeme-en-prod" → echo -n "changeme-en-prod" | base64
#
# En producción real NO se commitea un Secret con el password en claro al repo.
# Las opciones aceptadas en la industria son:
#   - external-secrets-operator → sync desde AWS Secrets Manager / Vault / GCP Secret Manager.
#   - sealed-secrets (Bitnami) → encripta el Secret con la pubkey del cluster, se puede commitear.
#   - HashiCorp Vault con Vault Agent Injector → inyecta secretos en runtime via sidecar.
#   - SOPS + age/KMS → encripta el YAML antes del commit, kubectl-sops lo desencripta al apply.
#
# Para el TP queda hardcoded para que el alumno pueda levantar todo con `kubectl apply -f`
# sin dependencias adicionales.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ml-scraper
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: ml-scraper-production
    app.kubernetes.io/version: "16"
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: ml-scraper
type: Opaque
data:
  # echo -n "changeme-en-prod" | base64
  POSTGRES_PASSWORD: Y2hhbmdlbWUtZW4tcHJvZA==
