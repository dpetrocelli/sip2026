# ConfigMap con la fuente de datos Loki preprovisionada para Grafana.
# ---------------------------------------------------------------------------
# Este ConfigMap es REDUNDANTE con el bloque `datasources:` del
# helm/grafana-values.yaml — está incluido como REFERENCIA explícita por dos
# razones pedagógicas:
#
#   1. El alumno puede ver, en YAML puro Kubernetes, cómo Grafana consume
#      datasources via provisioning (sin tener que leer la documentación
#      del chart de Helm).
#   2. Es lo que se usaría si Grafana se desplegara por manifest crudo en
#      lugar de Helm (escenario más simple para entender qué pasa abajo).
#
# Si se usa el chart con los `datasources:` inline, NO aplicar este
# ConfigMap (genera duplicados que Grafana ignora pero ensucia los logs).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-loki
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: datasource-config
    # Esta label es la que el sidecar de Grafana usa para autodiscover
    # ConfigMaps con datasources cuando `sidecar.datasources.enabled: true`.
    # Si está en false (como en grafana-values.yaml de este TP), la label
    # no hace nada pero la dejamos por consistencia.
    grafana_datasource: "1"
# Inmutable: una vez creado no se puede editar (hay que borrar y recrear).
# Esto previene mutaciones accidentales en el datasource principal — si hay
# que cambiar la URL de Loki, se borra y se vuelve a crear con el nuevo valor.
immutable: true
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        # uid estable: lo referencian los dashboards JSON. Si cambia, todos
        # los paneles muestran "Datasource not found".
        uid: loki
        type: loki
        # FQDN interno del Service Loki en el cluster.
        # Formato: <service>.<namespace>.svc.<cluster-domain>
        url: http://loki.observability.svc.cluster.local:3100
        access: proxy
        isDefault: true
        editable: false  # el alumno no debería romper esto desde la UI
        jsonData:
          maxLines: 1000
          timeout: 60
          # Si en el futuro se agrega tracing (Tempo), descomentar:
          # derivedFields:
          #   - datasourceUid: tempo
          #     matcherRegex: 'trace_id=(\w+)'
          #     name: TraceID
          #     url: '$${__value.raw}'
