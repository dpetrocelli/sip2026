# ===========================================================================
# grafana/alloy Helm chart — values para el TP 3 (collector de logs).
# ---------------------------------------------------------------------------
# Alloy es el sucesor unified de Promtail + Grafana Agent + OpenTelemetry
# Collector (los tres en uno). GA desde abril 2024, es lo que la cátedra
# eligió para 2026 porque Promtail entró en mantenimiento-only.
#
# Chart pinneado a la última 0.x conocida al momento de escribir el TP.
# Verificar la última disponible con:
#   helm repo update && helm search repo grafana/alloy --versions | head
# Comando de instalación:
#   helm upgrade --install alloy grafana/alloy \
#     -n observability \
#     -f helm/alloy-values.yaml \
#     --version 0.9.0
# ---------------------------------------------------------------------------
# Decisiones de diseño:
#   * DaemonSet → un Pod de Alloy por nodo del cluster, así cada nodo lee
#     SUS PROPIOS logs locales (`/var/log/pods/`) sin tráfico cross-node.
#   * Discovery filtrado al namespace `ml-scraper` → no enviamos los logs
#     del kube-system, traefik, metrics-server, etc., que llenarían Loki
#     con ruido inútil para el TP.
#   * Pipeline JSON → si el scraper emite logs estructurados (ver
#     scraper-json-logging.py), Alloy los parsea y promueve los campos
#     `producto`, `level`, `event` a labels — eso es lo que hace
#     queryable el dashboard sin tener que parsear regex en cada query.
#
# Alternativa Promtail (clásico), si se prefiere por familiaridad:
#   helm install promtail grafana/promtail --version 6.16.6 \
#     -n observability \
#     --set "config.clients[0].url=http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
#   Promtail sigue funcionando pero no recibe nuevas features desde 2024.
# ===========================================================================

# Modo controller: DaemonSet. Otras opciones: deployment, statefulset.
controller:
  type: daemonset
  # Tolerancias para que Alloy también corra en nodos master (en k3d single-node
  # el control-plane y el worker son el mismo nodo, pero en clusters reales
  # esto asegura cobertura total).
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists
  # hostPID/hostNetwork: NO los necesitamos. Solo leemos archivos del host.
  hostNetwork: false

# Mounts del host — Alloy necesita LEER los logs de los Pods en cada nodo.
# /var/log/pods/<namespace>_<pod>_<uid>/<container>/<n>.log es donde kubelet
# escribe stdout/stderr de cada contenedor.
# /var/lib/docker/containers/ es para clusters con Docker como runtime
# (k3d, Docker Desktop). En clusters con containerd puro este path no existe
# pero tampoco molesta — el extraVolumes lo dejamos opcional.
alloy:
  mounts:
    varlog: true
    dockercontainers: true

  # Configuración de Alloy en Alloy syntax (ex-Flow / River).
  # Esta es la pipeline mínima: discovery k8s → relabel a labels Loki → write.
  configMap:
    create: true
    content: |-
      // ----------------------------------------------------------------------
      // 1. Descubrir Pods del cluster vía la Kubernetes API.
      //    Alloy usa el ServiceAccount del DaemonSet para autenticarse.
      // ----------------------------------------------------------------------
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // ----------------------------------------------------------------------
      // 2. Filtrar SOLO los pods del namespace `ml-scraper` y armar los labels
      //    Loki (`namespace`, `pod`, `container`, `producto` si viene como
      //    label del Pod).
      // ----------------------------------------------------------------------
      discovery.relabel "ml_scraper_pods" {
        targets = discovery.kubernetes.pods.targets

        // Drop everything that no es del namespace ml-scraper.
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "keep"
          regex         = "ml-scraper"
        }

        // Promover labels útiles del Pod a labels Loki.
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        // Si el Pod tiene una label `producto=...` (útil cuando se lanza
        // el Job parametrizado), la promovemos también.
        rule {
          source_labels = ["__meta_kubernetes_pod_label_producto"]
          target_label  = "producto"
        }
      }

      // ----------------------------------------------------------------------
      // 3. Source: leer los archivos `/var/log/pods/<...>/*.log` que kubelet
      //    rota por nosotros.
      // ----------------------------------------------------------------------
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.ml_scraper_pods.output
        forward_to = [loki.process.parse_json.receiver]
      }

      // ----------------------------------------------------------------------
      // 4. Pipeline de procesamiento: si la línea es JSON (lo emite el scraper
      //    cuando usa python-json-logger), parsear los campos y promover
      //    `level`, `event`, `producto` como labels para que se puedan
      //    filtrar con LogQL sin escanear el cuerpo del log.
      //
      //    Si NO es JSON (ej. logs de Selenium en formato libre), la stage
      //    `json` falla silenciosamente y la línea pasa tal cual al siguiente
      //    stage — sin labels parseados pero con el contenido intacto.
      // ----------------------------------------------------------------------
      loki.process "parse_json" {
        forward_to = [loki.write.default.receiver]

        stage.json {
          expressions = {
            level    = "level",
            event    = "event",
            producto = "producto",
          }
        }

        stage.labels {
          values = {
            level    = "",
            event    = "",
            producto = "",
          }
        }
      }

      // ----------------------------------------------------------------------
      // 5. Sink: push a Loki via HTTP.
      // ----------------------------------------------------------------------
      loki.write "default" {
        endpoint {
          url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
        // En multi-tenant: external_labels = { tenant = "ml-scraper" }
        // y agregar header X-Scope-OrgID en el endpoint. Para el TP, off.
      }

# RBAC: Alloy necesita listar/watch Pods (para discovery.kubernetes).
rbac:
  create: true

serviceAccount:
  create: true
  name: alloy

# CRDs: Alloy NO requiere CRDs propios (a diferencia de PodMonitor/ServiceMonitor
# de Prometheus Operator). Si el chart trae alguna instalación condicional, off.
crds:
  create: false

# Recursos por Pod del DaemonSet.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Sin sidecars de configReloader externo — Alloy soporta SIGHUP nativo y
# el chart ya gestiona el reload cuando el ConfigMap cambia.

# Service del cluster: ClusterIP en 12345 para el endpoint de admin/UI de
# Alloy (útil para debugging: `kubectl port-forward svc/alloy 12345:12345`
# y abrir http://localhost:12345 → muestra el grafo de componentes).
service:
  enabled: true
  type: ClusterIP
  clusterIP: ""
  annotations: {}
