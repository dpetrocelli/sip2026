# ===========================================================================
# grafana/grafana Helm chart — values para el TP 3 (visualización de logs).
# ---------------------------------------------------------------------------
# Chart pinneado a la última 8.x LTS conocida al momento de escribir el TP.
# Verificar la última disponible con:
#   helm repo update && helm search repo grafana/grafana --versions | head
# Comando de instalación:
#   helm upgrade --install grafana grafana/grafana \
#     -n observability \
#     -f helm/grafana-values.yaml \
#     --version 8.5.0
# ---------------------------------------------------------------------------
# Decisiones de diseño:
#   * NodePort 30000 → acceso directo desde el host con `localhost:30000`
#     sin tener que correr `kubectl port-forward`. Esto es OK porque el
#     cluster es local (k3s/k3d) y no está expuesto a internet.
#     En cualquier cluster compartido usar Ingress + TLS + auth real.
#   * Admin password en Secret externo → no hardcodeamos credenciales en
#     values. El alumno crea el Secret a mano (ver README) o usa
#     external-secrets/sealed-secrets en escenarios reales.
#   * Datasource Loki preprovisionado → el alumno abre Grafana y la fuente
#     ya está conectada. Cero clicks de configuración manual.
#   * Dashboard provider apunta a un ConfigMap → los JSONs de
#     dashboards/*.json se cargan automáticamente en /var/lib/grafana/.
# ===========================================================================

# Imagen y tag — fijar minor para que upgrades de chart no traigan major bumps
# inesperados de Grafana (ej. 11 → 12 con breaking changes en plugins).
image:
  repository: grafana/grafana
  # tag: vacío == lee del chart (que viene con la versión Grafana correspondiente).
  # Si querés pinnear a una específica: tag: "11.4.0"
  pullPolicy: IfNotPresent

# Service: NodePort fijo en 30000. NodePorts válidos: 30000-32767.
service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30000

# Persistencia: dashboards, plugins, alerting state. Sin esto, cualquier cosa
# que el alumno cree desde la UI desaparece al reiniciar el Pod.
persistence:
  enabled: true
  storageClassName: local-path
  size: 2Gi
  accessModes:
    - ReadWriteOnce

# Admin credentials por Secret externo.
# Crear ANTES de instalar el chart con:
#   kubectl -n observability create secret generic grafana-admin \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password='CAMBIAR_ESTO'
# El campo `existingSecret` evita que el chart genere un Secret aleatorio
# que después no podamos predecir.
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

# Datasources preprovisionados — Loki preconfigurado, listo para usar.
# El nombre `Loki` es el que se referencia desde el dashboard JSON
# (`datasource.uid: loki`).
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        # FQDN interno del Service de Loki dentro del namespace observability.
        url: http://loki.observability.svc.cluster.local:3100
        access: proxy
        # Marcamos como default para que las nuevas Explore queries lo usen.
        isDefault: true
        jsonData:
          # Apunta el "Trace ID → tracing datasource" a vacío; sin tracing aún.
          maxLines: 1000
          # Timeout generoso para queries con `unwrap` sobre rangos largos.
          timeout: 60

# Dashboard providers preprovisionados — apunta a /var/lib/grafana/dashboards
# donde el sidecar va a montar los ConfigMaps con label grafana_dashboard=1.
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'tp3-default'
        orgId: 1
        folder: 'TP3 — ML Scraper'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/tp3-default

# Sidecar que watchea ConfigMaps con label grafana_dashboard=1 y los
# materializa como JSON en el path del provider de arriba.
# Para cargar el dashboard ml-scraper.json:
#   kubectl -n observability create configmap ml-scraper-dashboard \
#     --from-file=ml-scraper.json=dashboards/ml-scraper.json
#   kubectl -n observability label configmap ml-scraper-dashboard \
#     grafana_dashboard=1
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    folder: /var/lib/grafana/dashboards/tp3-default
    searchNamespace: observability
    provider:
      foldersFromFilesStructure: false
  datasources:
    enabled: false  # ya los proveemos inline arriba

# Recursos modestos — Grafana para 1 usuario con 5-6 paneles consume muy poco.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Apagamos las initContainers de plugins externos (no usamos ninguno custom).
# Si después se quieren agregar (ej. clock panel), descomentar:
# plugins:
#   - grafana-clock-panel

# Test pod del chart — no lo necesitamos.
testFramework:
  enabled: false

# RBAC mínimo — el sidecar de dashboards necesita listar ConfigMaps.
rbac:
  create: true
  namespaced: true  # solo en `observability`, no cluster-wide
  pspEnabled: false  # PSP está deprecated y removido en k8s 1.25+
