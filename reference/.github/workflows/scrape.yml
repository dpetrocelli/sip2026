# Pipeline CI/CD — SIP 2026 Selenium Reference
#
# Triggers: push a main, pull requests, manual.
# Jobs (en orden de dependencia):
#   lint       → ruff check + format
#   secrets    → gitleaks
#   unit-tests → pytest + coverage gate (≥70%)
#   k8s-validation → kubectl --dry-run sobre hit8/k8s/
#   integration-tests → matriz Chrome/Firefox (depende de unit-tests)

name: Scraper CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # ───────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install ruff
        run: uv pip install --system ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  # ───────────────────────────────────────────
  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────
  unit-tests:
    name: Unit tests + coverage gate (≥70%)
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: pytest
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

  # ───────────────────────────────────────────
  k8s-validation:
    name: Kubernetes manifests (dry-run)
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: latest
      - name: Validate manifests
        run: |
          for f in hit8/k8s/*.yaml; do
            echo "→ $f"
            kubectl apply --dry-run=client -f "$f" --validate=true
          done

  # ───────────────────────────────────────────
  integration-tests:
    name: E2E smoke (Docker + ${{ matrix.browser }})
    runs-on: ubuntu-24.04
    needs: [unit-tests, secrets]
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (target hit5)
        run: docker build --target hit5 -t ml-scraper:ci .

      - name: Run scraper smoke test
        # 1 producto, 3 resultados — smoke test mínimo, no martillamos ML
        run: |
          mkdir -p output screenshots logs
          docker run --rm \
            -e BROWSER=${{ matrix.browser }} \
            -e HEADLESS=true \
            -v ${{ github.workspace }}/output:/app/output \
            -v ${{ github.workspace }}/screenshots:/app/screenshots \
            -v ${{ github.workspace }}/logs:/app/logs \
            ml-scraper:ci \
            --browser ${{ matrix.browser }} \
            --products "bicicleta rodado 29" \
            --limit 3

      - name: Verify JSON output
        run: |
          test -f output/bicicleta_rodado_29.json
          python3 -c "
          import json
          with open('output/bicicleta_rodado_29.json') as f:
              data = json.load(f)
          assert isinstance(data, list), 'output must be a list'
          assert len(data) >= 1, f'expected at least 1 result, got {len(data)}'
          for item in data:
              assert 'titulo' in item and item['titulo'], 'missing or empty title'
              assert 'link' in item and item['link'].startswith('http'), 'invalid link'
          print(f'OK — {len(data)} resultados validados')
          "

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-${{ matrix.browser }}
          path: |
            output/
            screenshots/
            logs/
          retention-days: 14
