name: Build Pages

on:
  push:
    branches:
      - main
    paths:
      - "TP0.md"
      - "TP1.md"
      - "TP2.md"
      - "template.html"
      - "build.sh"
      - "assets/style.css"

concurrency:
  group: build-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build HTMLs
        run: ./build.sh

      - name: Commit and push regenerated HTMLs
        run: |
          git diff --quiet || (git config user.name "github-actions" && git config user.email "actions@github.com" && git add practica-*.html && git commit -m "chore: rebuild HTMLs [skip ci]" && git push)
